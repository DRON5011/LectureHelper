version: '3.9'

services:

  db:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_DB: lecturehelper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  backend:
    build: .

    ports:
      - "8000:8000"

    depends_on:
      - db